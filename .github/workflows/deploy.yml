name: Deploy Eating Python for Breakfast to GitHub Pages

on:
  push:
    branches:
      - master # Or use 'master' if your default branch is named master

permissions:
  contents: write # Crucial: Allows GitHub Actions to push the built site to your gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material

      - name: Build and Deploy to GitHub Pages
        run: |
          mkdocs gh-deploy --force